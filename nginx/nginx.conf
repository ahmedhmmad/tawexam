events {}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  keepalive_timeout  65;

  upstream backend_upstream {
    server backend:3000;
  }

  server {
    listen 80;
    server_name tawjihi.megaserv.xyz;

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  server {
    listen 443 ssl http2;
    server_name tawjihi.megaserv.xyz;

    ssl_certificate /etc/letsencrypt/live/tawjihi.megaserv.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tawjihi.megaserv.xyz/privkey.pem;

    client_max_body_size 20M;

    location /socket.io/ {
      proxy_pass http://backend_upstream/socket.io/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "Upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      proxy_pass http://backend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin {
      alias /usr/share/nginx/html/admin;
      try_files $uri $uri/ /admin/index.html;
    }

    location / {
      root /usr/share/nginx/html;
      try_files $uri $uri/ /index.html;
    }
  }
}

